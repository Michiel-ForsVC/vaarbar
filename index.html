<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DE VAARBAR — Bestellingen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --off-white: #f4f1ec;
    --gray-light: #e8e4dd;
    --gray-mid: #b0a99e;
    --gray-dark: #4a4540;
    --accent: #3d6fd4;
    --accent-dark: #2347a8;
    --danger: #c0392b;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* LAYOUT */
  #app {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: 64px 1fr;
    height: 100vh;
    width: 100vw;
  }

  /* HEADER */
  #header {
    grid-column: 1 / -1;
    background: var(--black);
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 20px;
  }

  .logo-circle {
    width: 42px; height: 42px;
    border: 2px solid var(--white);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    flex-shrink: 0;
  }

  .logo-text-svg {
    width: 38px; height: 38px;
  }

  #header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--white);
    letter-spacing: 3px;
  }

  #header .subtitle {
    font-size: 12px;
    color: var(--gray-mid);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-left: auto;
  }

  /* LEFT PANEL - MENU */
  #menu-panel {
    background: #111;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* TABS */
  #tabs {
    display: flex;
    background: var(--black);
    border-bottom: 1px solid #222;
    overflow-x: auto;
    scrollbar-width: none;
  }
  #tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--gray-mid);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 14px 22px 11px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .tab-btn:hover { color: var(--white); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ITEMS GRID */
  #items-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: #333 transparent;
  }

  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
  }

  .item-card {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 16px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    position: relative;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .item-card:hover {
    background: #222;
    border-color: #3a3a3a;
  }
  .item-card:active {
    transform: scale(0.97);
    background: #252520;
    border-color: var(--accent);
  }
  .item-card.in-order {
    border-color: var(--accent);
    background: #141b2e;
  }

  .item-card .item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--white);
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .item-card .item-sub {
    font-size: 11px;
    color: var(--gray-mid);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .item-card .item-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .item-qty-badge {
    position: absolute;
    top: 10px; right: 10px;
    background: var(--accent);
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    min-width: 24px; height: 24px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 6px;
    line-height: 1;
  }

  /* RIGHT PANEL - ORDER */
  #order-panel {
    background: var(--off-white);
    border-left: 1px solid #222;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #order-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--gray-light);
    flex-shrink: 0;
  }

  #order-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: var(--black);
  }

  #order-header .order-meta {
    font-size: 11px;
    color: var(--gray-dark);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  #order-items {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    scrollbar-width: thin;
    scrollbar-color: #ccc transparent;
  }

  .order-item-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px solid var(--gray-light);
    animation: slideIn 0.15s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .order-item-name {
    flex: 1;
    font-size: 13px;
    font-weight: 500;
    color: var(--black);
    line-height: 1.3;
  }

  .order-item-price {
    font-size: 12px;
    color: var(--gray-dark);
    min-width: 40px;
    text-align: right;
  }

  .qty-controls {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--white);
    border: 1px solid var(--gray-light);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .qty-btn {
    width: 32px; height: 32px;
    background: none;
    border: none;
    font-size: 18px;
    color: var(--black);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
    font-weight: 600;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .qty-btn:hover { background: var(--gray-light); }
  .qty-btn.minus { color: var(--danger); }

  .qty-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px;
    min-width: 28px;
    text-align: center;
    color: var(--black);
    border-left: 1px solid var(--gray-light);
    border-right: 1px solid var(--gray-light);
    line-height: 32px;
    height: 32px;
  }

  /* ORDER FOOTER */
  #order-footer {
    padding: 14px 16px;
    border-top: 1px solid var(--gray-light);
    flex-shrink: 0;
    background: var(--off-white);
  }

  #total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }

  #total-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--gray-dark);
  }

  #total-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--black);
    letter-spacing: 1px;
  }

  #count-row {
    font-size: 11px;
    color: var(--gray-mid);
    margin-bottom: 14px;
  }

  #new-order-btn {
    width: 100%;
    background: var(--black);
    color: var(--white);
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  #new-order-btn:hover { background: #222; }
  #new-order-btn:active { transform: scale(0.98); background: var(--accent-dark); }

  .empty-order {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray-mid);
    font-size: 13px;
  }
  .empty-order svg {
    display: block;
    margin: 0 auto 12px;
    opacity: 0.3;
  }

  /* Confirm overlay */
  #confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #confirm-overlay.show { display: flex; }

  #confirm-box {
    background: var(--off-white);
    border-radius: 16px;
    padding: 32px;
    max-width: 340px;
    width: 90%;
    text-align: center;
  }
  #confirm-box h3 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--black);
    margin-bottom: 8px;
  }
  #confirm-box p {
    font-size: 14px;
    color: var(--gray-dark);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .confirm-btns {
    display: flex;
    gap: 10px;
  }
  .confirm-btns button {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .confirm-btns button:hover { opacity: 0.85; }
  #confirm-cancel { background: var(--gray-light); color: var(--black); }
  #confirm-ok { background: var(--black); color: var(--white); }

  /* MOBILE */
  @media (max-width: 768px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: 56px 1fr auto;
    }

    #header { padding: 0 16px; }
    #header h1 { font-size: 22px; }
    #header .subtitle { display: none; }

    #menu-panel {
      grid-column: 1;
      grid-row: 2;
      overflow: hidden;
    }

    #order-panel {
      grid-column: 1;
      grid-row: 3;
      border-left: none;
      border-top: 1px solid #333;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: auto;
      max-height: 80vh;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.3);
      z-index: 50;
      transform: translateY(calc(100% - 68px));
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    #order-panel.open {
      transform: translateY(0);
    }

    #order-handle {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 20px 0;
      cursor: pointer;
      background: var(--off-white);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .handle-bar {
      width: 36px; height: 4px;
      background: var(--gray-mid);
      border-radius: 2px;
      margin-bottom: 8px;
    }

    #order-handle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding-bottom: 10px;
    }

    #order-handle h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--black);
    }

    #mobile-total-pill {
      background: var(--black);
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 1px;
      padding: 4px 14px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #mobile-badge {
      background: var(--accent);
      color: var(--white);
      font-size: 13px;
      min-width: 20px; height: 20px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }

    #order-header { display: none; }

    #order-items {
      max-height: calc(80vh - 180px);
      overflow-y: auto;
    }

    #items-container { padding: 12px; }
    .items-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .item-card { padding: 12px 10px; }
    .item-card .item-name { font-size: 13px; }

    .tab-btn { font-size: 13px; padding: 12px 16px 9px; letter-spacing: 1.5px; }

    /* push content up so bottom sheet doesn't cover it */
    #menu-panel {
      padding-bottom: 0;
      flex-direction: column;
    }
    #search-bar {
      order: -1; /* move search to top, below tabs */
      position: static;
      z-index: auto;
      border-top: none;
      border-bottom: 1px solid #222;
    }
    #items-container {
      padding-bottom: 80px; /* space above bottom sheet */
    }
  }

  /* SEARCH BAR */
  #search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #0e0e0e;
    border-top: 1px solid #222;
    flex-shrink: 0;
  }

  #search-input {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input::placeholder { color: var(--gray-dark); }
  #search-input:focus { border-color: var(--accent); }

  #search-clear {
    background: none;
    border: none;
    color: var(--gray-mid);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    display: none;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  #search-clear.visible { display: block; }

  .search-results-label {
    font-size: 11px;
    color: var(--gray-mid);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 20px 4px;
  }

  @media (max-width: 768px) {
    #search-bar {
      padding: 8px 12px;
    }
    #search-input {
      font-size: 16px;
      padding: 11px 14px;
    }
    #search-clear { font-size: 22px; padding: 6px 10px; }
  }

  @media (min-width: 769px) {
    #order-handle { display: none; }
    #mobile-total-pill { display: none; }
    #mobile-badge { display: none; }
  }
</style>
</head>
<body>

<div id="app">
  <header id="header">
    <div class="logo-circle">
      <svg class="logo-text-svg" viewBox="0 0 100 100">
        <defs>
          <path id="circle-top" d="M 50,50 m -32,0 a 32,32 0 1,1 64,0" />
          <path id="circle-bot" d="M 50,50 m -32,0 a 32,32 0 0,0 64,0" />
        </defs>
        <text fill="white" font-family="'Bebas Neue', sans-serif" font-size="17" letter-spacing="3">
          <textPath href="#circle-top" startOffset="2%">VAARBAR</textPath>
        </text>
        <text fill="white" font-family="'Bebas Neue', sans-serif" font-size="17" letter-spacing="6">
          <textPath href="#circle-bot" startOffset="18%">DE</textPath>
        </text>
      </svg>
    </div>
    <h1>DE VAARBAR</h1>
    <span class="subtitle">Bestelsysteem</span>
  </header>

  <section id="menu-panel">
    <nav id="tabs"></nav>
    <div id="items-container">
      <div class="items-grid" id="items-grid"></div>
    </div>
    <div id="search-bar">
      <input id="search-input" type="search" inputmode="search" placeholder="Zoek een drankje..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oninput="onSearch(this.value)" />
      <button id="search-clear" onclick="clearSearch()">✕</button>
    </div>
  </section>

  <aside id="order-panel">
    <div id="order-handle" onclick="toggleOrderPanel()">
      <div class="handle-bar"></div>
      <div id="order-handle-row">
        <h2>Bestelling</h2>
        <div id="mobile-total-pill">
          <span id="mobile-badge" style="display:none">0</span>
          <span id="mobile-total">€ 0,00</span>
        </div>
      </div>
    </div>
    <div id="order-header">
      <h2>Bestelling</h2>
      <div class="order-meta" id="order-meta">Geen items</div>
    </div>
    <div id="order-items"></div>
    <div id="order-footer">
      <div id="total-row">
        <span id="total-label">Totaal</span>
        <span id="total-amount">€ 0,00</span>
      </div>
      <div id="count-row" id="count-row"></div>
      <button id="new-order-btn" onclick="askNewOrder()">+ NIEUW ORDER</button>
    </div>
  </aside>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <h3>Nieuw order?</h3>
    <p>De huidige bestelling wordt gewist. Ben je zeker?</p>
    <div class="confirm-btns">
      <button id="confirm-cancel" onclick="closeConfirm()">Annuleer</button>
      <button id="confirm-ok" onclick="confirmNewOrder()">Wissen</button>
    </div>
  </div>
</div>

<script>
const MENU = {
  "Aperitieven": [
    { name: "Campari Spritz", sub: "Campari · 25 cl", price: 7.50 },
    { name: "Aperol Spritz", sub: "Aperol · 25 cl", price: 7.00 },
    { name: "Lillet Blanc", sub: "Lillet · 10 cl", price: 5.50 },
    { name: "Martini Rosso", sub: "Martini · 10 cl", price: 5.00 },
    { name: "Gin Tonic", sub: "Diverse · 50 cl", price: 8.50 },
    { name: "Prosecco", sub: "Valdo · 15 cl", price: 5.50 },
    { name: "Cava", sub: "Huismerk · 15 cl", price: 5.00 },
  ],
  "Wijnen": [
    { name: "Huiswijn Rood", sub: "Merlot/Cab · 15 cl", price: 4.50 },
    { name: "Huiswijn Wit", sub: "Chardonnay · 15 cl", price: 4.50 },
    { name: "Huiswijn Rosé", sub: "Grenache · 15 cl", price: 4.50 },
    { name: "Côtes du Rhône", sub: "Rood · Fles 75 cl", price: 22.00 },
    { name: "Sauvignon Blanc", sub: "Wit · Fles 75 cl", price: 24.00 },
    { name: "Rosé de Provence", sub: "Rosé · Fles 75 cl", price: 26.00 },
    { name: "Prosecco Fles", sub: "Mousserend · 75 cl", price: 28.00 },
  ],
  "Cocktails": [
    { name: "Mojito", sub: "Rum, munt, limoen", price: 9.00 },
    { name: "Daiquiri", sub: "Rum, limoen, suiker", price: 9.00 },
    { name: "Cosmopolitan", sub: "Vodka, cranberry", price: 9.50 },
    { name: "Espresso Martini", sub: "Vodka, kahlúa", price: 10.00 },
    { name: "Negroni", sub: "Gin, Campari", price: 9.50 },
    { name: "Aperol Spritz", sub: "Aperol, prosecco", price: 7.00 },
    { name: "Virgin Mojito", sub: "Alcoholvrij", price: 6.00 },
    { name: "Tropical Punch", sub: "Alcoholvrij", price: 6.00 },
  ],
  "Frisdranken": [
    { name: "Cola", sub: "Coca-Cola · 33 cl", price: 3.00 },
    { name: "Fanta Orange", sub: "33 cl", price: 3.00 },
    { name: "Sprite", sub: "33 cl", price: 3.00 },
    { name: "Ice Tea", sub: "Fuze Tea · 33 cl", price: 3.00 },
    { name: "Tonic", sub: "Schweppes · 20 cl", price: 2.50 },
    { name: "Bruiswater", sub: "SPA Rood · 33 cl", price: 2.50 },
    { name: "Plat water", sub: "SPA Blauw · 33 cl", price: 2.50 },
    { name: "Verse Jus", sub: "Vers geperst · 25 cl", price: 3.50 },
    { name: "Red Bull", sub: "25 cl", price: 4.00 },
  ],
  "Snacks": [
    { name: "Nootjes mix", sub: "Geroosterd", price: 3.00 },
    { name: "Chips", sub: "Naturel of paprika", price: 2.50 },
    { name: "Olijven", sub: "Gemarineerd", price: 3.50 },
    { name: "Broodplankje", sub: "Stokbrood + dips", price: 6.00 },
    { name: "Kaasplankje", sub: "Lokale kazen", price: 9.00 },
    { name: "Charcuterie", sub: "Ham, salami, coppa", price: 9.00 },
    { name: "Bitterballen", sub: "6 stuks", price: 7.00 },
    { name: "Veggie bitterballen", sub: "6 stuks", price: 7.00 },
  ]
};

let currentTab = Object.keys(MENU)[0];
let order = {};

function buildTabs() {
  const tabs = document.getElementById('tabs');
  Object.keys(MENU).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (cat === currentTab ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => switchTab(cat);
    tabs.appendChild(btn);
  });
}

function switchTab(cat) {
  currentTab = cat;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', Object.keys(MENU)[i] === cat);
  });
  // Reset search
  searchQuery = '';
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  document.getElementById('search-clear').classList.remove('visible');
  renderItems();
}

function getOrderKey(cat, name) { return cat + '|||' + name; }

function renderItems() {
  const grid = document.getElementById('items-grid');
  grid.innerHTML = '';
  MENU[currentTab].forEach(item => {
    const key = getOrderKey(currentTab, item.name);
    const qty = order[key] ? order[key].qty : 0;
    const card = document.createElement('div');
    card.className = 'item-card' + (qty > 0 ? ' in-order' : '');
    card.innerHTML = `
      ${qty > 0 ? `<div class="item-qty-badge">${qty}</div>` : ''}
      <div class="item-name">${item.name}</div>
      <div class="item-sub">${item.sub}</div>
      <div class="item-price">€ ${item.price.toFixed(2).replace('.', ',')}</div>
    `;
    card.onclick = () => addToOrder(currentTab, item);
    grid.appendChild(card);
  });
}

function addToOrder(cat, item) {
  const key = getOrderKey(cat, item.name);
  if (order[key]) {
    order[key].qty++;
  } else {
    order[key] = { name: item.name, price: item.price, qty: 1, cat };
  }
  renderItems();
  renderOrder();
}

function changeQty(key, delta) {
  if (!order[key]) return;
  order[key].qty += delta;
  if (order[key].qty <= 0) delete order[key];
  renderItems();
  renderOrder();
}

function renderOrder() {
  const container = document.getElementById('order-items');
  const keys = Object.keys(order);

  if (keys.length === 0) {
    container.innerHTML = `
      <div class="empty-order">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Nog niets besteld
      </div>`;
    document.getElementById('order-meta').textContent = 'Geen items';
    document.getElementById('total-amount').textContent = '€ 0,00';
    document.getElementById('count-row').textContent = '';
    return;
  }

  let total = 0;
  let totalItems = 0;
  container.innerHTML = '';

  keys.forEach(key => {
    const item = order[key];
    const lineTotal = item.price * item.qty;
    total += lineTotal;
    totalItems += item.qty;

    const row = document.createElement('div');
    row.className = 'order-item-row';
    row.innerHTML = `
      <div class="order-item-name">${item.name}</div>
      <div class="order-item-price">€ ${lineTotal.toFixed(2).replace('.', ',')}</div>
      <div class="qty-controls">
        <button class="qty-btn minus" onclick="changeQty('${key}', -1)">−</button>
        <div class="qty-display">${item.qty}</div>
        <button class="qty-btn plus" onclick="changeQty('${key}', 1)">+</button>
      </div>
    `;
    container.appendChild(row);
  });

  document.getElementById('order-meta').textContent = `${keys.length} artikel${keys.length !== 1 ? 's' : ''}`;
  document.getElementById('total-amount').textContent = '€ ' + total.toFixed(2).replace('.', ',');
  document.getElementById('count-row').textContent = `${totalItems} stuks totaal`;
}

function askNewOrder() {
  if (Object.keys(order).length === 0) return;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
}

function confirmNewOrder() {
  order = {};
  closeConfirm();
  renderItems();
  renderOrder();
}

function toggleOrderPanel() {
  const panel = document.getElementById('order-panel');
  panel.classList.toggle('open');
}

// --- SWIPE GESTURE FOR BOTTOM SHEET ---
(function() {
  const panel = document.getElementById('order-panel');
  const handle = document.getElementById('order-handle');
  if (!handle) return;

  let startY = 0;
  let startTranslate = 0;
  let isDragging = false;
  const CLOSED_TRANSLATE = '100% - 68px';

  function getCurrentTranslate() {
    const style = window.getComputedStyle(panel);
    const matrix = new DOMMatrix(style.transform);
    return matrix.m42; // translateY value in px
  }

  function getPanelHeight() {
    return panel.offsetHeight;
  }

  handle.addEventListener('touchstart', (e) => {
    isDragging = true;
    startY = e.touches[0].clientY;
    startTranslate = getCurrentTranslate();
    panel.style.transition = 'none';
  }, { passive: true });

  window.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const dy = e.touches[0].clientY - startY;
    let newY = startTranslate + dy;
    // Clamp: can't go above 0 (fully open) or below closed position
    const maxDown = getPanelHeight() - 68;
    newY = Math.max(-10, Math.min(newY, maxDown));
    panel.style.transform = `translateY(${newY}px)`;
  }, { passive: true });

  window.addEventListener('touchend', (e) => {
    if (!isDragging) return;
    isDragging = false;
    panel.style.transition = 'transform 0.32s cubic-bezier(0.4, 0, 0.2, 1)';

    const dy = e.changedTouches[0].clientY - startY;
    const panelH = getPanelHeight();

    if (dy < -40) {
      // Swiped up — open
      panel.classList.add('open');
      panel.style.transform = '';
    } else if (dy > 40) {
      // Swiped down — close
      panel.classList.remove('open');
      panel.style.transform = '';
    } else {
      // Small movement — toggle based on current position
      const currentY = getCurrentTranslate();
      if (currentY < panelH / 2) {
        panel.classList.add('open');
      } else {
        panel.classList.remove('open');
      }
      panel.style.transform = '';
    }
  }, { passive: true });
})();

function updateMobilePill() {
  const keys = Object.keys(order);
  const totalItems = keys.reduce((s, k) => s + order[k].qty, 0);
  const total = keys.reduce((s, k) => s + order[k].price * order[k].qty, 0);
  const badge = document.getElementById('mobile-badge');
  const mob = document.getElementById('mobile-total');
  if (mob) mob.textContent = '€ ' + total.toFixed(2).replace('.', ',');
  if (badge) {
    badge.textContent = totalItems;
    badge.style.display = totalItems > 0 ? 'flex' : 'none';
  }
}

const _origRenderOrder = renderOrder;
renderOrder = function() {
  _origRenderOrder();
  updateMobilePill();
};

let searchQuery = '';

function onSearch(val) {
  searchQuery = val.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', val.length > 0);
  if (searchQuery.length > 0) {
    renderSearchResults();
  } else {
    renderItems();
  }
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('search-clear').classList.remove('visible');
  renderItems();
}

function renderSearchResults() {
  const grid = document.getElementById('items-grid');
  grid.innerHTML = '';

  // Collect all matches across all categories
  let matches = [];
  Object.keys(MENU).forEach(cat => {
    MENU[cat].forEach(item => {
      if (item.name.toLowerCase().includes(searchQuery) || item.sub.toLowerCase().includes(searchQuery)) {
        matches.push({ cat, item });
      }
    });
  });

  if (matches.length === 0) {
    grid.innerHTML = `<div style="color:var(--gray-mid);font-size:13px;padding:20px;grid-column:1/-1;">Geen resultaten voor "<strong style="color:var(--white)">${searchQuery}</strong>"</div>`;
    return;
  }

  // Add label
  const label = document.createElement('div');
  label.className = 'search-results-label';
  label.style.gridColumn = '1 / -1';
  label.textContent = `${matches.length} resultaat${matches.length !== 1 ? 'en' : ''}`;
  grid.appendChild(label);

  matches.forEach(({ cat, item }) => {
    const key = getOrderKey(cat, item.name);
    const qty = order[key] ? order[key].qty : 0;
    const card = document.createElement('div');
    card.className = 'item-card' + (qty > 0 ? ' in-order' : '');
    // Highlight match
    const highlighted = item.name.replace(new RegExp(`(${searchQuery})`, 'gi'), '<mark style="background:var(--accent);color:var(--white);border-radius:2px;padding:0 2px">$1</mark>');
    card.innerHTML = `
      ${qty > 0 ? `<div class="item-qty-badge">${qty}</div>` : ''}
      <div class="item-name">${highlighted}</div>
      <div class="item-sub">${item.sub} · <span style="color:var(--gray-mid);font-size:10px">${cat}</span></div>
      <div class="item-price">€ ${item.price.toFixed(2).replace('.', ',')}</div>
    `;
    card.onclick = () => {
      addToOrder(cat, item);
      // Re-render search results to update badges
      renderSearchResults();
    };
    grid.appendChild(card);
  });
}

// Override renderItems to respect active search
const _origRenderItems = renderItems;
renderItems = function() {
  if (searchQuery.length > 0) {
    renderSearchResults();
  } else {
    _origRenderItems();
  }
};

buildTabs();
renderItems();
renderOrder();
</script>
